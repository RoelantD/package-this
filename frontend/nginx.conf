server {
    listen 4200;
    root /usr/share/nginx/html;
    index index.html;

    # Angular routing — serve index.html for all non-file paths.
    # Revalidate so the SPA shell is never served stale.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }

    # Proxy API calls to backend
    location /api/ {
        proxy_pass ${BACKEND_URL}/;
        proxy_ssl_server_name on;
        proxy_set_header X-Real-IP $remote_addr;
        # Never let browsers cache API responses (prevents stale SPA-fallback HTML)
        proxy_hide_header Cache-Control;
        add_header Cache-Control "no-store" always;
    }

    # Proxy WebSocket connections to backend
    location /ws {
        proxy_pass ${BACKEND_URL}/ws;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
